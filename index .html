<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>カレンダー連携アプリ</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@300;400;500;700&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0e0e14;
    --surface: #16161f;
    --surface2: #1e1e2e;
    --border: #2a2a3e;
    --accent: #7c6af7;
    --accent2: #4fc3f7;
    --text: #e8e8f0;
    --text2: #8888a8;
    --success: #4caf82;
    --error: #f76a6a;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Noto Sans JP', sans-serif;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
  }
  header {
    width: 100%;
    padding: 20px 40px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    border-bottom: 1px solid var(--border);
    background: var(--surface);
  }
  .logo { font-family: 'Space Mono', monospace; font-size: 16px; color: var(--accent); letter-spacing: 2px; }
  .logo span { color: var(--accent2); }
  #auth-status { display: flex; align-items: center; gap: 8px; font-size: 13px; }
  .status-dot { width: 8px; height: 8px; border-radius: 50%; background: var(--error); }
  .status-dot.connected { background: var(--success); animation: pulse 2s infinite; }
  @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.5} }

  /* Login overlay */
  #login-overlay {
    position: fixed;
    inset: 0;
    background: rgba(14,14,20,0.95);
    display: flex;
    align-items: center;
    justify-content: center;
    z-index: 100;
  }
  .login-box {
    background: var(--surface);
    border: 1px solid var(--accent);
    border-radius: 16px;
    padding: 40px;
    text-align: center;
    max-width: 360px;
    width: 90%;
  }
  .login-box h2 { font-size: 20px; margin-bottom: 8px; }
  .login-box p { color: var(--text2); font-size: 14px; margin-bottom: 24px; }
  .btn-google {
    display: inline-flex;
    align-items: center;
    gap: 10px;
    background: white;
    color: #333;
    border: none;
    border-radius: 8px;
    padding: 12px 24px;
    font-size: 15px;
    font-weight: 500;
    cursor: pointer;
    transition: all 0.2s;
  }
  .btn-google:hover { background: #f0f0f0; transform: translateY(-1px); }

  main {
    width: 100%;
    max-width: 900px;
    padding: 24px 20px 60px;
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 20px;
  }
  .card { background: var(--surface); border: 1px solid var(--border); border-radius: 14px; overflow: hidden; }
  .card-header { padding: 16px 20px; border-bottom: 1px solid var(--border); display: flex; align-items: center; gap: 10px; }
  .card-icon { width: 32px; height: 32px; border-radius: 8px; display: flex; align-items: center; justify-content: center; font-size: 16px; }
  .card-icon.add { background: rgba(124,106,247,0.15); }
  .card-icon.view { background: rgba(79,195,247,0.15); }
  .card-title { font-weight: 500; font-size: 15px; }
  .card-body { padding: 20px; }
  .form-group { margin-bottom: 16px; }
  label { display: block; font-size: 12px; color: var(--text2); margin-bottom: 6px; }
  input[type="text"], input[type="date"], input[type="time"], textarea {
    width: 100%;
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 10px 12px;
    color: var(--text);
    font-family: 'Noto Sans JP', sans-serif;
    font-size: 14px;
    -webkit-appearance: none;
  }
  input:focus, textarea:focus { outline: none; border-color: var(--accent); }
  textarea { resize: vertical; min-height: 60px; }
  .row { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
  .btn {
    padding: 10px 20px;
    border-radius: 8px;
    border: none;
    cursor: pointer;
    font-family: 'Noto Sans JP', sans-serif;
    font-size: 13px;
    font-weight: 500;
    transition: all 0.2s;
    width: 100%;
  }
  .btn-primary { background: var(--accent); color: white; }
  .btn-primary:hover { background: #9580ff; }
  .btn-secondary { background: transparent; color: var(--accent2); border: 1px solid var(--accent2); }
  .btn-secondary:hover { background: rgba(79,195,247,0.1); }
  .btn:disabled { opacity: 0.4; cursor: not-allowed; }

  #events-list { min-height: 120px; }
  .event-item {
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 12px 14px;
    margin-bottom: 10px;
    border-left: 3px solid var(--accent);
    animation: slideIn 0.3s ease;
  }
  @keyframes slideIn { from{opacity:0;transform:translateY(-8px)} to{opacity:1;transform:translateY(0)} }
  .event-title { font-weight: 500; font-size: 14px; margin-bottom: 4px; }
  .event-time { font-size: 12px; color: var(--accent2); font-family: 'Space Mono', monospace; }
  .event-desc { font-size: 12px; color: var(--text2); margin-top: 4px; }
  .empty-state { text-align: center; padding: 40px 20px; color: var(--text2); font-size: 13px; }
  .empty-state .icon { font-size: 36px; margin-bottom: 10px; opacity: 0.4; }

  #toast {
    position: fixed;
    bottom: 30px;
    left: 50%;
    transform: translateX(-50%) translateY(80px);
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 12px 20px;
    font-size: 13px;
    transition: transform 0.3s ease;
    z-index: 999;
    min-width: 260px;
    text-align: center;
    box-shadow: 0 8px 32px rgba(0,0,0,0.4);
  }
  #toast.show { transform: translateX(-50%) translateY(0); }
  #toast.success { border-color: var(--success); color: var(--success); }
  #toast.error { border-color: var(--error); color: var(--error); }
  .spinner {
    display: inline-block;
    width: 14px; height: 14px;
    border: 2px solid rgba(255,255,255,0.2);
    border-top-color: white;
    border-radius: 50%;
    animation: spin 0.7s linear infinite;
    vertical-align: middle;
    margin-right: 6px;
  }
  @keyframes spin { to{transform:rotate(360deg)} }
  @media (max-width: 680px) {
    main { grid-template-columns: 1fr; }
    header { padding: 16px 20px; }
  }
</style>
</head>
<body>

<header>
  <div class="logo">CAL<span>SYNC</span></div>
  <div id="auth-status">
    <div class="status-dot" id="status-dot"></div>
    <span id="status-text">未接続</span>
  </div>
</header>

<!-- Login Overlay -->
<div id="login-overlay">
  <div class="login-box">
    <div style="font-size:48px;margin-bottom:16px">📅</div>
    <h2>カレンダー連携アプリ</h2>
    <p>Googleアカウントでログインして<br>カレンダーと連携してください</p>
    <button class="btn-google" onclick="login()">
      <svg width="18" height="18" viewBox="0 0 18 18"><path fill="#4285F4" d="M16.51 8H8.98v3h4.3c-.18 1-.74 1.48-1.6 2.04v2.01h2.6a7.8 7.8 0 0 0 2.38-5.88c0-.57-.05-.66-.15-1.18z"/><path fill="#34A853" d="M8.98 17c2.16 0 3.97-.72 5.3-1.94l-2.6-2a4.8 4.8 0 0 1-7.18-2.54H1.83v2.07A8 8 0 0 0 8.98 17z"/><path fill="#FBBC05" d="M4.5 10.52a4.8 4.8 0 0 1 0-3.04V5.41H1.83a8 8 0 0 0 0 7.18l2.67-2.07z"/><path fill="#EA4335" d="M8.98 4.18c1.17 0 2.23.4 3.06 1.2l2.3-2.3A8 8 0 0 0 1.83 5.4L4.5 7.49a4.77 4.77 0 0 1 4.48-3.31z"/></svg>
      Googleでログイン
    </button>
  </div>
</div>

<main>
  <div class="card">
    <div class="card-header">
      <div class="card-icon add">📅</div>
      <div class="card-title">予定を追加</div>
    </div>
    <div class="card-body">
      <div class="form-group">
        <label>タイトル</label>
        <input type="text" id="event-title" placeholder="例：会議、ランチ、勉強" />
      </div>
      <div class="form-group">
        <label>日付</label>
        <input type="date" id="event-date" />
      </div>
      <div class="row">
        <div class="form-group">
          <label>開始時間</label>
          <input type="time" id="event-start" />
        </div>
        <div class="form-group">
          <label>終了時間</label>
          <input type="time" id="event-end" />
        </div>
      </div>
      <div class="form-group">
        <label>メモ（任意）</label>
        <textarea id="event-desc" placeholder="詳細やメモを入力..."></textarea>
      </div>
      <button class="btn btn-primary" id="add-btn" onclick="addEvent()">Googleカレンダーに追加</button>
    </div>
  </div>

  <div class="card">
    <div class="card-header">
      <div class="card-icon view">🔍</div>
      <div class="card-title">予定を確認</div>
    </div>
    <div class="card-body">
      <div class="form-group">
        <label>日付を選択</label>
        <input type="date" id="search-date" />
      </div>
      <div class="row" style="margin-bottom:16px">
        <div class="form-group" style="margin-bottom:0">
          <label>開始時間（任意）</label>
          <input type="time" id="search-start" />
        </div>
        <div class="form-group" style="margin-bottom:0">
          <label>終了時間（任意）</label>
          <input type="time" id="search-end" />
        </div>
      </div>
      <button class="btn btn-secondary" id="search-btn" style="margin-bottom:16px" onclick="searchEvents()">予定を検索</button>
      <div id="events-list">
        <div class="empty-state"><div class="icon">📆</div>日付を選んで検索してください</div>
      </div>
    </div>
  </div>
</main>

<div id="toast"></div>

<script src="https://accounts.google.com/gsi/client"></script>
<script>
const CLIENT_ID = '307855928755-ldh4somr5bbjp895eq4m43mtjcea22io.apps.googleusercontent.com';
const SCOPES = 'https://www.googleapis.com/auth/calendar';
let tokenClient = null;
let accessToken = null;

const today = new Date().toISOString().split('T')[0];
document.getElementById('event-date').value = today;
document.getElementById('search-date').value = today;

window.onload = () => {
  tokenClient = google.accounts.oauth2.initTokenClient({
    client_id: CLIENT_ID,
    scope: SCOPES,
    callback: (response) => {
      if (response.error) {
        showToast('ログインに失敗しました', 'error');
        return;
      }
      accessToken = response.access_token;
      document.getElementById('login-overlay').style.display = 'none';
      document.getElementById('status-dot').className = 'status-dot connected';
      document.getElementById('status-text').textContent = '接続済み';
      showToast('Googleカレンダーに接続しました！');
    },
  });
};

function login() {
  tokenClient.requestAccessToken();
}

function showToast(msg, type = 'success') {
  const t = document.getElementById('toast');
  t.textContent = (type === 'success' ? '✅ ' : '❌ ') + msg;
  t.className = `show ${type}`;
  setTimeout(() => t.className = '', 3000);
}

async function addEvent() {
  if (!accessToken) { showToast('先にログインしてください', 'error'); return; }
  const title = document.getElementById('event-title').value.trim();
  const date = document.getElementById('event-date').value;
  const start = document.getElementById('event-start').value;
  const end = document.getElementById('event-end').value;
  const desc = document.getElementById('event-desc').value.trim();
  if (!title || !date || !start || !end) { showToast('タイトル・日付・時間を入力してください', 'error'); return; }
  const btn = document.getElementById('add-btn');
  btn.disabled = true;
  btn.innerHTML = '<span class="spinner"></span>追加中...';
  try {
    const res = await fetch('https://www.googleapis.com/calendar/v3/calendars/primary/events', {
      method: 'POST',
      headers: { 'Authorization': `Bearer ${accessToken}`, 'Content-Type': 'application/json' },
      body: JSON.stringify({
        summary: title, description: desc,
        start: { dateTime: `${date}T${start}:00`, timeZone: 'Asia/Tokyo' },
        end: { dateTime: `${date}T${end}:00`, timeZone: 'Asia/Tokyo' }
      })
    });
    if (res.ok) {
      showToast('予定を追加しました！');
      document.getElementById('event-title').value = '';
      document.getElementById('event-start').value = '';
      document.getElementById('event-end').value = '';
      document.getElementById('event-desc').value = '';
    } else {
      const err = await res.json();
      showToast('エラー: ' + (err.error?.message || '追加失敗'), 'error');
    }
  } catch(e) { showToast('ネットワークエラーが発生しました', 'error'); }
  finally { btn.disabled = false; btn.textContent = 'Googleカレンダーに追加'; }
}

async function searchEvents() {
  if (!accessToken) { showToast('先にログインしてください', 'error'); return; }
  const date = document.getElementById('search-date').value;
  const startTime = document.getElementById('search-start').value;
  const endTime = document.getElementById('search-end').value;
  if (!date) { showToast('日付を選択してください', 'error'); return; }
  const btn = document.getElementById('search-btn');
  btn.disabled = true;
  btn.innerHTML = '<span class="spinner"></span>検索中...';
  const timeMin = startTime ? `${date}T${startTime}:00+09:00` : `${date}T00:00:00+09:00`;
  const timeMax = endTime ? `${date}T${endTime}:00+09:00` : `${date}T23:59:59+09:00`;
  try {
    const res = await fetch(`https://www.googleapis.com/calendar/v3/calendars/primary/events?timeMin=${encodeURIComponent(timeMin)}&timeMax=${encodeURIComponent(timeMax)}&singleEvents=true&orderBy=startTime`, {
      headers: { 'Authorization': `Bearer ${accessToken}` }
    });
    if (!res.ok) throw new Error();
    const data = await res.json();
    const list = document.getElementById('events-list');
    if (!data.items?.length) {
      list.innerHTML = '<div class="empty-state"><div class="icon">🕊️</div>この時間帯に予定はありません</div>';
      return;
    }
    list.innerHTML = data.items.map(ev => {
      const s = ev.start?.dateTime ? new Date(ev.start.dateTime) : null;
      const e = ev.end?.dateTime ? new Date(ev.end.dateTime) : null;
      const t = s && e ? `${s.getHours().toString().padStart(2,'0')}:${s.getMinutes().toString().padStart(2,'0')} - ${e.getHours().toString().padStart(2,'0')}:${e.getMinutes().toString().padStart(2,'0')}` : '終日';
      const esc = str => str.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
      return `<div class="event-item"><div class="event-title">${esc(ev.summary||'（タイトルなし）')}</div><div class="event-time">🕐 ${t}</div>${ev.description?`<div class="event-desc">${esc(ev.description)}</div>`:''}</div>`;
    }).join('');
  } catch(e) { showToast('予定の取得に失敗しました', 'error'); }
  finally { btn.disabled = false; btn.textContent = '予定を検索'; }
}
</script>
</body>
</html>
